name: NodeJS with Vite

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.4.x]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.29.3
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.x
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm config set fetch-timeout 60000
          pnpm install --frozen-lockfile --prefer-offline --ignore-scripts
        timeout-minutes: 40
        env:
          npm_config_legacy_peer_deps: true
          PNPM_HOME: /tmp/pnpm-home

      - name: Build (with Turborepo)
        run: pnpm run build --filter ./app/harmoneasy
        timeout-minutes: 20
        env:
          NODE_ENV: production

      - name: Check build output
        run: |
          echo "Build step completed"
          ls -lah app/harmoneasy/dist/ || echo "dist folder not found"

      - name: List the build folder contents...
        run: ls -lah app/harmoneasy/dist/

      - name: Upload artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/harmoneasy/dist

  deploy:
    # Add a dependency to the build job
    needs: build

    # Specify runner + deployment step
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
