<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>
  <!-- MIDI device -->
  <rect x="14" y="20" width="32" height="24" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Device label -->
  <text x="30" y="36" font-size="8" text-anchor="middle" fill="currentColor">MIDI</text>
  <!-- Connection dots -->
  <circle cx="48" cy="28" r="1.5" fill="currentColor"/>
  <circle cx="48" cy="36" r="1.5" fill="currentColor"/>
  <circle cx="48" cy="44" r="1.5" fill="currentColor"/>
  <!-- Input connector -->
  <circle cx="8" cy="32" r="2.5" fill="currentColor"/>
  <line x1="10" y1="32" x2="12" y2="32" stroke="currentColor" stroke-width="1.5"/>
</svg>
