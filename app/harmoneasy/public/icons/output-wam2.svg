<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>
  <!-- WAM engine box -->
  <rect x="14" y="20" width="36" height="24" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Engine symbol (gear) -->
  <circle cx="32" cy="32" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Gear teeth -->
  <line x1="32" y1="25" x2="32" y2="23" stroke="currentColor" stroke-width="1"/>
  <line x1="39" y1="32" x2="41" y2="32" stroke="currentColor" stroke-width="1"/>
  <line x1="32" y1="39" x2="32" y2="41" stroke="currentColor" stroke-width="1"/>
  <line x1="25" y1="32" x2="23" y2="32" stroke="currentColor" stroke-width="1"/>
  <!-- Center indicator -->
  <circle cx="32" cy="32" r="2" fill="currentColor" opacity="0.7"/>
  <!-- Input connector -->
  <circle cx="8" cy="32" r="2.5" fill="currentColor"/>
  <line x1="10" y1="32" x2="12" y2="32" stroke="currentColor" stroke-width="1.5"/>
</svg>
