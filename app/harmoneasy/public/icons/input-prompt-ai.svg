<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>
  <!-- AI brain symbol -->
  <circle cx="28" cy="28" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Nodes -->
  <circle cx="22" cy="24" r="1.5" fill="currentColor" opacity="0.7"/>
  <circle cx="34" cy="24" r="1.5" fill="currentColor" opacity="0.7"/>
  <circle cx="22" cy="32" r="1.5" fill="currentColor" opacity="0.7"/>
  <circle cx="34" cy="32" r="1.5" fill="currentColor" opacity="0.7"/>
  <!-- Connections -->
  <line x1="22" y1="24" x2="28" y2="28" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="34" y1="24" x2="28" y2="28" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="22" y1="32" x2="28" y2="28" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <line x1="34" y1="32" x2="28" y2="28" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
  <!-- Prompt text indication -->
  <rect x="18" y="38" width="20" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1"/>
  <line x1="20" y1="41" x2="36" y2="41" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
  <!-- Output connector -->
  <circle cx="56" cy="32" r="2.5" fill="currentColor"/>
  <line x1="52" y1="32" x2="54" y2="32" stroke="currentColor" stroke-width="1.5"/>
</svg>
