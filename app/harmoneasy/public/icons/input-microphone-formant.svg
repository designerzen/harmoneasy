<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>
  <!-- Microphone body -->
  <rect x="24" y="18" width="16" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Microphone grille -->
  <line x1="26" y1="22" x2="38" y2="22" stroke="currentColor" stroke-width="0.5" opacity="0.6"/>
  <line x1="26" y1="25" x2="38" y2="25" stroke="currentColor" stroke-width="0.5" opacity="0.6"/>
  <line x1="26" y1="28" x2="38" y2="28" stroke="currentColor" stroke-width="0.5" opacity="0.6"/>
  <line x1="26" y1="31" x2="38" y2="31" stroke="currentColor" stroke-width="0.5" opacity="0.6"/>
  <!-- Cable connector -->
  <rect x="30" y="38" width="4" height="3" rx="1" fill="none" stroke="currentColor" stroke-width="1"/>
  <!-- Output connector -->
  <circle cx="56" cy="32" r="2.5" fill="currentColor"/>
  <line x1="52" y1="32" x2="54" y2="32" stroke="currentColor" stroke-width="1.5"/>
</svg>
