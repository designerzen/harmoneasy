<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>
  <!-- MIDI keyboard -->
  <rect x="10" y="22" width="36" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Black keys -->
  <rect x="17" y="22" width="2" height="12" fill="currentColor" opacity="0.6"/>
  <rect x="24" y="22" width="2" height="12" fill="currentColor" opacity="0.6"/>
  <rect x="34" y="22" width="2" height="12" fill="currentColor" opacity="0.6"/>
  <!-- White keys outline -->
  <line x1="14" y1="32" x2="14" y2="42" stroke="currentColor" stroke-width="1"/>
  <line x1="20" y1="32" x2="20" y2="42" stroke="currentColor" stroke-width="1"/>
  <line x1="26" y1="32" x2="26" y2="42" stroke="currentColor" stroke-width="1"/>
  <line x1="32" y1="32" x2="32" y2="42" stroke="currentColor" stroke-width="1"/>
  <line x1="38" y1="32" x2="38" y2="42" stroke="currentColor" stroke-width="1"/>
  <!-- Output connector -->
  <circle cx="56" cy="32" r="2.5" fill="currentColor"/>
  <line x1="52" y1="32" x2="54" y2="32" stroke="currentColor" stroke-width="1.5"/>
</svg>
