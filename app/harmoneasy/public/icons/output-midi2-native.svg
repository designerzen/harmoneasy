<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>
  <!-- MIDI 2.0 Native device -->
  <rect x="14" y="18" width="32" height="28" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Device label -->
  <text x="30" y="30" font-size="6" text-anchor="middle" fill="currentColor">MIDI 2.0</text>
  <text x="30" y="38" font-size="5" text-anchor="middle" fill="currentColor" opacity="0.7">Native</text>
  <!-- Connection indicators -->
  <circle cx="48" cy="24" r="1.5" fill="currentColor"/>
  <circle cx="48" cy="32" r="1.5" fill="currentColor"/>
  <circle cx="48" cy="40" r="1.5" fill="currentColor"/>
  <!-- Input connector -->
  <circle cx="8" cy="32" r="2.5" fill="currentColor"/>
  <line x1="10" y1="32" x2="12" y2="32" stroke="currentColor" stroke-width="1.5"/>
</svg>
