<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>
  <!-- MIDI device with connectors -->
  <rect x="12" y="20" width="32" height="24" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Device label -->
  <text x="28" y="36" font-size="8" text-anchor="middle" fill="currentColor">MIDI</text>
  <!-- Connection dots -->
  <circle cx="10" cy="28" r="1.5" fill="currentColor"/>
  <circle cx="10" cy="36" r="1.5" fill="currentColor"/>
  <circle cx="10" cy="44" r="1.5" fill="currentColor"/>
  <!-- Output connector -->
  <circle cx="56" cy="32" r="2.5" fill="currentColor"/>
  <line x1="52" y1="32" x2="54" y2="32" stroke="currentColor" stroke-width="1.5"/>
</svg>
