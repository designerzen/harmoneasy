<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>
  <!-- Clock face -->
  <circle cx="28" cy="32" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Clock marks -->
  <line x1="28" y1="22" x2="28" y2="20" stroke="currentColor" stroke-width="1" opacity="0.6"/>
  <line x1="38" y1="32" x2="40" y2="32" stroke="currentColor" stroke-width="1" opacity="0.6"/>
  <!-- Hour and minute hands -->
  <line x1="28" y1="32" x2="28" y2="25" stroke="currentColor" stroke-width="1.5" opacity="0.8"/>
  <line x1="28" y1="32" x2="33" y2="32" stroke="currentColor" stroke-width="1" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="28" cy="32" r="1.5" fill="currentColor"/>
  <!-- Sync indicator -->
  <circle cx="44" cy="26" r="2" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.7"/>
  <line x1="43" y1="28" x2="45" y2="30" stroke="currentColor" stroke-width="0.8" opacity="0.7"/>
  <!-- Output connector -->
  <circle cx="56" cy="32" r="2.5" fill="currentColor"/>
  <line x1="52" y1="32" x2="54" y2="32" stroke="currentColor" stroke-width="1.5"/>
</svg>
