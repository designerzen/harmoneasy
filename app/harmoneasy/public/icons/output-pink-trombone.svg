<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>
  <!-- Trombone slide -->
  <line x1="14" y1="32" x2="40" y2="32" stroke="currentColor" stroke-width="3" opacity="0.7"/>
  <!-- Trombone bell -->
  <path d="M 40 32 Q 50 22 50 32 Q 50 42 40 32" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Mouthpiece -->
  <circle cx="12" cy="32" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Vocal indicator -->
  <path d="M 45 24 Q 45 28 45 32" stroke="currentColor" stroke-width="1" opacity="0.6"/>
  <!-- Input connector -->
  <circle cx="8" cy="32" r="2.5" fill="currentColor"/>
  <line x1="10" y1="32" x2="12" y2="32" stroke="currentColor" stroke-width="1.5"/>
</svg>
