<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>
  <!-- Console window -->
  <rect x="12" y="18" width="40" height="28" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Title bar -->
  <line x1="12" y1="24" x2="52" y2="24" stroke="currentColor" stroke-width="1"/>
  <!-- Console text lines -->
  <line x1="16" y1="29" x2="48" y2="29" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
  <line x1="16" y1="33" x2="44" y2="33" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
  <line x1="16" y1="37" x2="40" y2="37" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
  <!-- Cursor -->
  <rect x="40" y="41" width="2" height="2" fill="currentColor" opacity="0.7"/>
  <!-- Input connector -->
  <circle cx="8" cy="32" r="2.5" fill="currentColor"/>
  <line x1="10" y1="32" x2="12" y2="32" stroke="currentColor" stroke-width="1.5"/>
</svg>
