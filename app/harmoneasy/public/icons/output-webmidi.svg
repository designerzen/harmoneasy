<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" fill="none"/>
  <!-- MIDI keyboard -->
  <rect x="14" y="22" width="28" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Black keys -->
  <rect x="20" y="22" width="2" height="12" fill="currentColor" opacity="0.6"/>
  <rect x="27" y="22" width="2" height="12" fill="currentColor" opacity="0.6"/>
  <!-- White keys outline -->
  <line x1="17" y1="32" x2="17" y2="42" stroke="currentColor" stroke-width="1"/>
  <line x1="23" y1="32" x2="23" y2="42" stroke="currentColor" stroke-width="1"/>
  <line x1="29" y1="32" x2="29" y2="42" stroke="currentColor" stroke-width="1"/>
  <line x1="35" y1="32" x2="35" y2="42" stroke="currentColor" stroke-width="1"/>
  <!-- Input connector -->
  <circle cx="8" cy="32" r="2.5" fill="currentColor"/>
  <line x1="10" y1="32" x2="12" y2="32" stroke="currentColor" stroke-width="1.5"/>
</svg>
